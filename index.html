<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#111;color:#fff;text-align:center}
#pad{width:200px;height:200px;background:#222;border-radius:50%;margin:40px auto;position:relative}
#stick{width:80px;height:80px;background:#555;border-radius:50%;position:absolute;left:60px;top:60px}
#history{margin-top:20px;text-align:left;height:200px;overflow:auto}
</style>
</head>

<body>

<h3 id="phase">等待</h3>
<div id="hp"></div>

<div id="pad"><div id="stick"></div></div>

<div id="history"></div>

<script>

/* ===== 狀態 ===== */

let hpA=2000,hpB=2000
let phase="IDLE"
let holding=false
let interval=null

let roundCount=0
let roundSummary=[]

const DAMAGE=200
const phaseDuration=1500

/* ===== 工具 ===== */

function enemyMove(){
return ["石頭","布","剪刀"][Math.floor(Math.random()*3)]
}

function judge(a,b){
if(a===b) return 0
if((a==="石頭"&&b==="剪刀")||(a==="剪刀"&&b==="布")||(a==="布"&&b==="石頭")) return 1
return -1
}

/* ===== UI ===== */

function updateUI(){
document.getElementById("hp").innerText=`HP A:${hpA} / HP B:${hpB}`
document.getElementById("phase").innerText=phase
}

function renderHistory(text){
document.getElementById("history").innerHTML=text
}

/* ===== 回合 ===== */

function startRound(){

roundCount++
phase="SCISSORS"
roundSummary=[]

updateUI()

interval=setInterval(nextPhase,phaseDuration)

}

function nextPhase(){

if(phase==="SCISSORS") phase="ROCK"
else if(phase==="ROCK") phase="PAPER"
else{
endRound()
return
}

updateUI()

}

/* ===== 出招 ===== */

let acted=false

function handleMove(move){

if(!holding) return
if(phase==="SCISSORS") return

if(acted) return
acted=true

let enemy=enemyMove()
let result=judge(move,enemy)

let text=`${phase} ${move} vs ${enemy} → `

if(result===1){
hpB-=DAMAGE
text+=`玩家勝（-${DAMAGE}HP）`
}
else if(result===-1){
hpA-=DAMAGE
text+=`玩家敗（-${DAMAGE}HP）`
}
else{
text+=`平手`
}

roundSummary.push(text)

updateUI()

/* ROCK 結束 */
if(phase==="ROCK"&&(move==="石頭"||enemy==="石頭")){
endRound()
return
}

/* PAPER 結束 */
if(phase==="PAPER"){
endRound()
return
}

}

/* ===== 結束 ===== */

function endRound(){

clearInterval(interval)
interval=null
holding=false

let finalText=`第${roundCount}回合：<br>`+
roundSummary.join("<br> → ")

renderHistory(finalText)

acted=false

}

/* ===== 操作盤 ===== */

const pad=document.getElementById("pad")

let startX=0,startY=0

pad.addEventListener("touchstart",e=>{
holding=true
acted=false
startX=e.touches[0].clientX
startY=e.touches[0].clientY
startRound()
})

pad.addEventListener("touchmove",e=>{

if(!holding) return

let x=e.touches[0].clientX-startX
let y=e.touches[0].clientY-startY

let dist=Math.sqrt(x*x+y*y)
if(dist<30) return

if(Math.abs(x)>Math.abs(y)){
handleMove(x>0?"布":"剪刀")
}else{
handleMove(y<0?"石頭":"不要")
}

})

pad.addEventListener("touchend",()=>{
holding=false
})

updateUI()

</script>

</body>
</html>
