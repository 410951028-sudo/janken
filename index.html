<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>猜拳戰鬥（節奏測試版）</title>

<style>
body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

.hp{
margin:10px;
font-size:18px;
}

#phase{
font-size:24px;
margin:10px;
}

#pad{
width:260px;
height:260px;
margin:20px auto;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

#center{
position:absolute;
width:100px;
height:100px;
left:80px;
top:80px;
background:#666;
border-radius:50%;
transition:0.05s;
}

#log{
margin-top:10px;
font-size:16px;
min-height:40px;
}
</style>
</head>

<body>

<div class="hp">玩家HP: <span id="hpA">2000</span></div>
<div class="hp">敵人HP: <span id="hpB">2000</span></div>

<div id="phase">等待開始</div>

<div id="pad">
<div id="center"></div>
</div>

<div id="log">按住開始</div>

<script>

/* ===== 基本 ===== */

let hpA = 2000
let hpB = 2000
const DAMAGE = 200

let phases = ["SCISSORS","ROCK","PAPER"]
let phaseIndex = 0
let phase = phases[0]

let holding = false
let timer = null

const phaseText = {
SCISSORS:"✌️ 剪刀（觀察）",
ROCK:"✊ 石頭（可出招）",
PAPER:"✋ 布（可出招）"
}

function updateUI(){
document.getElementById("hpA").innerText = hpA
document.getElementById("hpB").innerText = hpB
document.getElementById("phase").innerText = phaseText[phase] || "等待開始"
}

function log(text){
document.getElementById("log").innerText = text
}

/* ===== 判定 ===== */

function judge(a,b){
if(a===b) return 0

if(
(a==="石頭"&&b==="剪刀")||
(a==="布"&&b==="石頭")||
(a==="剪刀"&&b==="布")
) return 1

return -1
}

function enemyMove(){
let arr = ["石頭","布","剪刀"]
return arr[Math.floor(Math.random()*3)]
}

/* ===== 回合控制 ===== */

function startPhaseFlow(){

timer = setInterval(()=>{

if(!holding) return

/* 顯示剪刀 */
if(phase === "SCISSORS"){
log("觀察中...")
}

/* 推進 */
phaseIndex++

if(phaseIndex >= phases.length){
endRound("時間結束")
return
}

phase = phases[phaseIndex]
updateUI()

},1000)

}

function endRound(msg){

clearInterval(timer)
holding = false

log(msg + "（回合結束）")

phaseIndex = 0
phase = phases[0]

setTimeout(()=>{
updateUI()
log("按住開始")
},800)

}

/* ===== 出招 ===== */

function handleMove(move){

if(!holding) return

if(phase === "SCISSORS"){
log("剪刀階段不可出招")
return
}

let enemy = enemyMove()

let result = judge(move, enemy)

/* 傷害 */
if(result === 1){
hpB -= DAMAGE
}
else if(result === -1){
hpA -= DAMAGE
}

updateUI()

log(`你:${move} vs 敵:${enemy}`)

/* ROCK 特判 */
if(phase === "ROCK"){
if(move === "石頭" || enemy === "石頭"){
endRound("石頭觸發結束")
return
}
}

/* PAPER 結束 */
if(phase === "PAPER"){
endRound("布階段結束")
return
}

}

/* ===== 操作盤 ===== */

const pad = document.getElementById("pad")
const center = document.getElementById("center")

let startX, startY
let triggered = false

pad.addEventListener("touchstart",e=>{

if(holding) return

holding = true

phaseIndex = 0
phase = phases[0]

updateUI()
log("回合開始")

startPhaseFlow()

let t = e.touches[0]
startX = t.clientX
startY = t.clientY
triggered = false

})

pad.addEventListener("touchmove",e=>{

let t = e.touches[0]

let dx = t.clientX - startX
let dy = t.clientY - startY

let dist = Math.sqrt(dx*dx + dy*dy)

/* 跟手 */
let mx = Math.max(-40, Math.min(40, dx))
let my = Math.max(-40, Math.min(40, dy))
center.style.transform = `translate(${mx}px,${my}px)`

/* 出招 */
if(dist > 70 && !triggered){

triggered = true

let angle = Math.atan2(dy,dx)*180/Math.PI

let move

if(angle>=-45&&angle<=45) move="布"
else if(angle>45&&angle<135) move="空"
else if(angle>=135||angle<=-135) move="剪刀"
else move="石頭"

handleMove(move)
}

})

pad.addEventListener("touchend",()=>{

holding = false
clearInterval(timer)

center.style.transform = "translate(0,0)"

log("中斷")

})

updateUI()

</script>

</body>
</html>
