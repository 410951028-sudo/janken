<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>進階操作盤</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
font-family:sans-serif;
}

#pad{
width:240px;
height:240px;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

.dir{
position:absolute;
width:70px;
height:70px;
background:#444;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
transition:0.1s;
}

#up{top:10px;left:85px}
#down{bottom:10px;left:85px}
#left{left:10px;top:85px}
#right{right:10px;top:85px}

#center{
position:absolute;
width:90px;
height:90px;
left:75px;
top:75px;
background:#666;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
transition:0.05s;
}

#chargeCanvas{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
}

.active{
background:#0af;
transform:scale(1.15);
}

#log{
position:absolute;
bottom:40px;
font-size:22px;
}
</style>
</head>

<body>

<div id="pad">

<canvas id="chargeCanvas"></canvas>

<div id="up" class="dir">↑</div>
<div id="down" class="dir">↓</div>
<div id="left" class="dir">←</div>
<div id="right" class="dir">→</div>

<div id="center"></div>

</div>

<div id="log">等待操作</div>

<script>

const pad = document.getElementById("pad")
const centerEl = document.getElementById("center")
const canvas = document.getElementById("chargeCanvas")
const ctx = canvas.getContext("2d")

canvas.width = pad.offsetWidth
canvas.height = pad.offsetHeight

const dirs = {
up:document.getElementById("up"),
down:document.getElementById("down"),
left:document.getElementById("left"),
right:document.getElementById("right")
}

let startX, startY
let triggered = false
let charging = false
let chargeStart = 0

function vibrate(p){
if(navigator.vibrate) navigator.vibrate(p)
}

function clearActive(){
for(let d in dirs){
dirs[d].classList.remove("active")
}
}

function drawCharge(progress){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()
ctx.arc(canvas.width/2,canvas.height/2,60,-Math.PI/2,
(-Math.PI/2)+(Math.PI*2*progress))

ctx.strokeStyle = "#0af"
ctx.lineWidth = 6
ctx.stroke()

}

/* touchstart */

pad.addEventListener("touchstart",e=>{

const t = e.touches[0]

startX = t.clientX
startY = t.clientY

triggered = false
charging = true
chargeStart = Date.now()

vibrate(10)

})

/* touchmove */

pad.addEventListener("touchmove",e=>{

const t = e.touches[0]

let dx = t.clientX - startX
let dy = t.clientY - startY

let dist = Math.sqrt(dx*dx + dy*dy)

/* 蘑菇頭浮動（更大範圍） */
let follow = 35
let moveX = Math.max(-follow, Math.min(follow, dx))
let moveY = Math.max(-follow, Math.min(follow, dy))

centerEl.style.transform =
`translate(${moveX}px, ${moveY}px)`

/* 撥動門檻（更大） */
let threshold = 60

if(dist > threshold && !triggered){

triggered = true
charging = false
ctx.clearRect(0,0,canvas.width,canvas.height)

/* 方向判定 */
let angle = Math.atan2(dy,dx) * 180 / Math.PI

let dir

if(angle >= -45 && angle <= 45){
dir="right"
}
else if(angle > 45 && angle < 135){
dir="down"
}
else if(angle >= 135 || angle <= -135){
dir="left"
}
else{
dir="up"
}

/* 強震動 */
vibrate([40,20,40])

clearActive()
dirs[dir].classList.add("active")

document.getElementById("log").innerText =
"撥動: " + dir

}

/* 蓄力畫圈 */
if(charging){

let progress = (Date.now() - chargeStart)/1000

if(progress >= 1){

charging = false
drawCharge(1)

/* 蓄力完成震動 */
vibrate([100,30,100])

document.getElementById("log").innerText =
"蓄力完成"

}else{
drawCharge(progress)
}

}

})

/* touchend */

pad.addEventListener("touchend",()=>{

centerEl.style.transform = "translate(0,0)"
ctx.clearRect(0,0,canvas.width,canvas.height)
clearActive()

})

</script>

</body>
</html>
