<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>操作盤 + 戰鬥核心</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
overflow:hidden;
}

#pad{
width:260px;
height:260px;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

.dir{
position:absolute;
width:70px;
height:70px;
background:#444;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
transition:0.1s;
}

.dir.active{
background:#0af;
transform:scale(1.3);
box-shadow:0 0 12px #0af;
}

.dir.glow{
background:#0ff;
box-shadow:0 0 20px #0ff, 0 0 40px #0ff;
transform:scale(1.25);
}

#up{top:10px;left:95px}
#down{bottom:10px;left:95px}
#left{left:10px;top:95px}
#right{right:10px;top:95px}

#center{
position:absolute;
width:100px;
height:100px;
left:80px;
top:80px;
background:#666;
border-radius:50%;
transition:0.12s cubic-bezier(.2,1.5,.4,1);
}

#log{
position:absolute;
bottom:40px;
font-size:32px;
}

/* 進度條 */
#phaseBar{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:240px;
height:10px;
background:#333;
border-radius:6px;
overflow:hidden;
}

#phaseFill{
height:100%;
width:100%;
background:#0af;
transition:width linear;
}
</style>
</head>

<body>

<div id="phaseBar">
  <div id="phaseFill"></div>
</div>

<div id="pad">

<div id="up" class="dir">✊</div>
<div id="down" class="dir">❌</div>
<div id="left" class="dir">✌️</div>
<div id="right" class="dir">🖐️</div>

<canvas id="ring"></canvas>
<div id="center"></div>

</div>

<div id="log">等待操作</div>

<script>

/* =========================
   🎮 操作盤
========================= */

const pad = document.getElementById("pad")
const centerEl = document.getElementById("center")
const canvas = document.getElementById("ring")
const ctx = canvas.getContext("2d")

canvas.width = pad.offsetWidth
canvas.height = pad.offsetHeight

const dirs = {
up:document.getElementById("up"),
down:document.getElementById("down"),
left:document.getElementById("left"),
right:document.getElementById("right")
}

const state = {
startX:0,startY:0,
charging:false,
charged:false,
triggered:false,
chargeStart:0,
loop:null
}

const config = {
follow:60,
previewDist:30,
cancelChargeDist:35,
triggerDist:65,
chargeTime:500
}

function getDir(dx,dy){
let angle=Math.atan2(dy,dx)*180/Math.PI
if(angle>=-45&&angle<=45)return"right"
if(angle>45&&angle<135)return"down"
if(angle>=135||angle<=-135)return"left"
return"up"
}

function moveStick(dx,dy){
let f=config.follow
centerEl.style.transform=`translate(${Math.max(-f,Math.min(f,dx))}px,${Math.max(-f,Math.min(f,dy))}px)`
}

function resetStick(){centerEl.style.transform="translate(0,0)"}

function setActive(dir){
Object.values(dirs).forEach(d=>d.classList.remove("active"))
if(dir)dirs[dir].classList.add("active")
}

function setGlow(dir){
Object.values(dirs).forEach(d=>d.classList.remove("glow"))
if(dir)dirs[dir].classList.add("glow")
}

function drawRing(progress){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.beginPath()
ctx.arc(canvas.width/2,canvas.height/2,60,-Math.PI/2,(-Math.PI/2)+(Math.PI*2*progress))
ctx.strokeStyle="#0af"
ctx.lineWidth=6
ctx.stroke()
}

function startCharge(){
state.charging=true
state.charged=false
state.chargeStart=Date.now()

state.loop=setInterval(()=>{
let p=(Date.now()-state.chargeStart)/config.chargeTime

if(p>=1&&!state.charged){
drawRing(1)
state.charged=true
if(currentDir)setGlow(currentDir)
return
}

if(state.charging&&!state.charged)drawRing(p)
},16)
}

function stopCharge(){
clearInterval(state.loop)
ctx.clearRect(0,0,canvas.width,canvas.height)
state.charging=false
}

let currentDir=null

function convertInput(dir,charged){
if(charged)return"none"
switch(dir){
case"up":return"rock"
case"right":return"paper"
case"left":return"scissors"
case"down":return"cancel"
}
return null
}

pad.addEventListener("touchstart",e=>{
let t=e.touches[0]
state.startX=t.clientX
state.startY=t.clientY
state.triggered=false
state.charged=false
currentDir=null
startCharge()
startRound() // 👉 按住開始回合
})

pad.addEventListener("touchmove",e=>{
let t=e.touches[0]
let dx=t.clientX-state.startX
let dy=t.clientY-state.startY
let dist=Math.hypot(dx,dy)

moveStick(dx,dy)

if(dist>config.previewDist){
currentDir=getDir(dx,dy)
if(!state.charged)setActive(currentDir)
}

if(dist>config.triggerDist&&!state.triggered&&!state.charged){
state.triggered=true
stopCharge()
let dir=getDir(dx,dy)
sendInput(convertInput(dir,false))
}
})

pad.addEventListener("touchend",()=>{
stopCharge()
resetStick()

if(state.charged&&!state.triggered){
sendInput("none")
}

setTimeout(()=>{
Object.values(dirs).forEach(d=>d.classList.remove("active","glow"))
},200)
})

/* =========================
   🎮 戰鬥核心
========================= */

const game={
phase:"IDLE",
currentInput:null,
round:null,
timers:[]
}

function calcDamage(input,phase){

if(input==="none"||input==="cancel")return 0

if(phase==="ROCK"){
if(input==="rock")return 700
if(input==="paper")return 900
if(input==="scissors")return Math.random()<0.3?900:400
}

if(phase==="PAPER"){
if(input==="rock")return 1000
if(input==="paper")return 1100
if(input==="scissors")return Math.random()<0.4?1000:500
}

return 0
}

function startRound(){

clearTimers()

game.round={
rockPhase:null,
paperPhase:null,
total:0
}

setPhase("SCISSORS",1000,()=>{

setPhase("ROCK",1000,()=>{

resolvePhase("ROCK")

if(game.round.rockPhase.input==="rock"||game.round.rockPhase.input==="paper"){
endRound()
return
}

setPhase("PAPER",1000,()=>{
resolvePhase("PAPER")
endRound()
})

})

})

}

function setPhase(phase,duration,onEnd){

game.phase=phase
game.currentInput=null

startBar(duration)

let t=setTimeout(onEnd,duration)
game.timers.push(t)
}

const bar=document.getElementById("phaseFill")

function startBar(duration){
bar.style.transition="none"
bar.style.width="100%"
requestAnimationFrame(()=>{
bar.style.transition=`width ${duration}ms linear`
bar.style.width="0%"
})
}

function resolvePhase(phase){

let input=game.currentInput
if(input===null)input="none"

let dmg=calcDamage(input,phase)

if(phase==="ROCK"){
game.round.rockPhase={input,damage:dmg}
}

if(phase==="PAPER"){
game.round.paperPhase={input,damage:dmg}
}

game.round.total+=dmg

console.log(phase,input,dmg)
}

function endRound(){
clearTimers()
console.log("回合結束",game.round)
}

function clearTimers(){
game.timers.forEach(t=>clearTimeout(t))
game.timers=[]
}

function sendInput(input){

if(game.phase==="SCISSORS")return
if(game.currentInput!==null)return

game.currentInput=input

console.log("輸入:",input)
}

</script>

</body>
</html>
