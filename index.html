<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>猜拳戰鬥核心測試</title>

<style>
body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

.hp{
margin:10px;
font-size:18px;
}

#phase{
font-size:24px;
margin:10px;
}

#pad{
width:260px;
height:260px;
margin:20px auto;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

#center{
position:absolute;
width:100px;
height:100px;
left:80px;
top:80px;
background:#666;
border-radius:50%;
}

#log{
margin-top:10px;
font-size:16px;
min-height:40px;
}
</style>
</head>

<body>

<div class="hp">玩家HP: <span id="hpA">2000</span></div>
<div class="hp">敵人HP: <span id="hpB">2000</span></div>

<div id="phase">SCISSORS</div>

<div id="pad">
<div id="center"></div>
</div>

<div id="log">開始</div>

<script>

let hpA = 2000
let hpB = 2000

const DAMAGE = 200

let phases = ["SCISSORS","ROCK","PAPER"]
let phaseIndex = 0
let phase = phases[phaseIndex]

let playerMove = null

const phaseText = {
SCISSORS:"✌️ 剪刀（不可出招）",
ROCK:"✊ 石頭",
PAPER:"✋ 布"
}

function updateUI(){
document.getElementById("hpA").innerText = hpA
document.getElementById("hpB").innerText = hpB
document.getElementById("phase").innerText = phaseText[phase]
}

function log(text){
document.getElementById("log").innerText = text
}

/* 判定 */
function judge(a,b){
if(a===b) return 0

if(
(a==="石頭"&&b==="剪刀")||
(a==="布"&&b==="石頭")||
(a==="剪刀"&&b==="布")
) return 1

return -1
}

/* 電腦出拳 */
function enemyMove(){
let arr = ["石頭","布","剪刀"]
return arr[Math.floor(Math.random()*3)]
}

/* 進入下一階段 */
function nextPhase(){
phaseIndex++

if(phaseIndex >= phases.length){
endRound("進入布階段結束")
return
}

phase = phases[phaseIndex]
updateUI()
}

/* 結束回合 */
function endRound(msg){
log(msg + "（回合結束）")

phaseIndex = 0
phase = phases[0]
playerMove = null

setTimeout(()=>{
updateUI()
log("新回合開始")
},1000)
}

/* 處理出招 */
function handleMove(move){

/* 剪刀階段不能出招 */
if(phase === "SCISSORS"){
log("剪刀階段不能出招")
return
}

let enemy = enemyMove()

let result = judge(move, enemy)

/* 傷害 */
if(result === 1){
hpB -= DAMAGE
}
else if(result === -1){
hpA -= DAMAGE
}

updateUI()

log(`你:${move} vs 敵:${enemy}`)

/* ===== ROCK 特判 ===== */
if(phase === "ROCK"){
if(move === "石頭" || enemy === "石頭"){
endRound("石頭觸發結束")
return
}
}

/* ===== PAPER 結束 ===== */
if(phase === "PAPER"){
endRound("布階段結束")
return
}

/* 進下一階段 */
nextPhase()

}

/* ===== 操作盤 ===== */

const pad = document.getElementById("pad")
const center = document.getElementById("center")

let startX, startY
let triggered = false

pad.addEventListener("touchstart",e=>{
let t = e.touches[0]
startX = t.clientX
startY = t.clientY
triggered = false
})

pad.addEventListener("touchmove",e=>{

let t = e.touches[0]

let dx = t.clientX - startX
let dy = t.clientY - startY

let dist = Math.sqrt(dx*dx + dy*dy)

/* 跟手 */
let mx = Math.max(-40, Math.min(40, dx))
let my = Math.max(-40, Math.min(40, dy))
center.style.transform = `translate(${mx}px,${my}px)`

/* 判定 */
if(dist > 70 && !triggered){

triggered = true

let angle = Math.atan2(dy,dx)*180/Math.PI

let move

if(angle>=-45&&angle<=45) move="布"
else if(angle>45&&angle<135) move="空"
else if(angle>=135||angle<=-135) move="剪刀"
else move="石頭"

handleMove(move)
}

})

pad.addEventListener("touchend",()=>{
center.style.transform = "translate(0,0)"
})

updateUI()

</script>

</body>
</html>
