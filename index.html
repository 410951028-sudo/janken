<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>猜拳對戰</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#222">

</head>

<body>

<div id="game">

<div class="player rotate">

<div class="hpbar">
<div id="hpB"></div>
</div>

<div class="damage" id="damageB"></div>

</div>

<div class="phase">

<div id="p_scissor">✌️</div>
<div id="p_rock">👊</div>
<div id="p_paper">✋</div>

</div>

<div class="player">

<div class="hpbar">
<div id="hpA"></div>
</div>

<div class="damage" id="damageA"></div>

</div>

<div id="pad">

<div id="up">👊</div>
<div id="left">✋</div>

<div id="center">
<img src="img/fist.png">
</div>

<div id="right">✌️</div>
<div id="down">❌</div>

</div>

<button id="restart">重新開始</button>

</div>

<script src="app.js"></script>

</body>
</html>
