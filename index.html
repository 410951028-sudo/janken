<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>操作盤優化版</title>

<!-- ================= CSS ================= -->
<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
}

#pad{
width:260px;
height:260px;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

.dir{
position:absolute;
width:70px;
height:70px;
background:#444;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
transition:0.1s;
}

.dir.active{
background:#0af;
transform:scale(1.2);
}

#up{top:10px;left:95px}
#down{bottom:10px;left:95px}
#left{left:10px;top:95px}
#right{right:10px;top:95px}

#center{
position:absolute;
width:100px;
height:100px;
left:80px;
top:80px;
background:#666;
border-radius:50%;
transition:0.12s cubic-bezier(.2,1.5,.4,1);
}

#log{
position:absolute;
bottom:40px;
font-size:22px;
}

</style>
</head>

<body>

<!-- ================= HTML ================= -->
<div id="pad">

<div id="up" class="dir">↑</div>
<div id="down" class="dir">↓</div>
<div id="left" class="dir">←</div>
<div id="right" class="dir">→</div>

<canvas id="ring"></canvas>

<div id="center"></div>

</div>

<div id="log">等待操作</div>

<!-- ================= JS ================= -->
<script>

// ===== DOM =====
const pad = document.getElementById("pad")
const centerEl = document.getElementById("center")
const canvas = document.getElementById("ring")
const ctx = canvas.getContext("2d")

canvas.width = pad.offsetWidth
canvas.height = pad.offsetHeight

const dirs = {
up:document.getElementById("up"),
down:document.getElementById("down"),
left:document.getElementById("left"),
right:document.getElementById("right")
}
  
const actionMap = {
up: "✊",
right: "✋",
left: "✌️",
down: "❌"
}
  
// ===== 狀態 =====
let startX, startY
let charging = false
let triggered = false
let chargeStart = 0
let loop = null

// ===== 工具 =====
function vibrate(p){
if(navigator.vibrate) navigator.vibrate(p)
}

function clearActive(){
for(let d in dirs){
dirs[d].classList.remove("active")
}
}

function log(t){
document.getElementById("log").innerText=t
}

// ===== 畫蓄力圈 =====
function drawRing(progress){

ctx.clearRect(0,0,canvas.width,canvas.height)

let cx = canvas.width/2
let cy = canvas.height/2

ctx.beginPath()
ctx.arc(cx, cy, 60, -Math.PI/2,
(-Math.PI/2)+(Math.PI*2*progress))

ctx.strokeStyle="#0af"
ctx.lineWidth=6
ctx.stroke()
}

// ===== 蓄力 =====
function startChargeLoop(){

loop = setInterval(()=>{

if(!charging) return

let progress = (Date.now()-chargeStart)/1000

if(progress >= 1){

charging = false
drawRing(1)

vibrate([120,40,120])
log("蓄力完成")

}else{
drawRing(progress)
}

},16)

}

function stopChargeLoop(){
clearInterval(loop)
ctx.clearRect(0,0,canvas.width,canvas.height)
}

// ===== 觸控開始 =====
pad.addEventListener("touchstart",e=>{

const t = e.touches[0]

startX = t.clientX
startY = t.clientY

charging = true
triggered = false
chargeStart = Date.now()

startChargeLoop()

vibrate(10)

})

// ===== 觸控移動 =====
pad.addEventListener("touchmove",e=>{

const t = e.touches[0]

let dx = t.clientX - startX
let dy = t.clientY - startY

let dist = Math.sqrt(dx*dx + dy*dy)

/* 蘑菇頭 */
let follow = 60
let mx = Math.max(-follow, Math.min(follow, dx))
let my = Math.max(-follow, Math.min(follow, dy))

centerEl.style.transform =
`translate(${mx}px,${my}px)`

/* 蓄力取消 */
if(dist > 35 && charging){
charging = false
stopChargeLoop()
}

/* 即時預覽 */
if(dist > 30 && !triggered){

let angle = Math.atan2(dy,dx)*180/Math.PI
let dir

if(angle>=-45&&angle<=45) dir="right"
else if(angle>45&&angle<135) dir="down"
else if(angle>=135||angle<=-135) dir="left"
else dir="up"

clearActive()
dirs[dir].classList.add("active")
}

/* 真正觸發 */
let threshold = 75

if(dist > threshold && !triggered){

triggered = true
charging = false
stopChargeLoop()

let angle = Math.atan2(dy,dx)*180/Math.PI
let dir

if(angle>=-45&&angle<=45) dir="right"
else if(angle>45&&angle<135) dir="down"
else if(angle>=135||angle<=-135) dir="left"
else dir="up"

vibrate([50,30,50])

clearActive()
dirs[dir].classList.add("active")

log(actionMap[dir])
}

})

// ===== 觸控結束 =====
pad.addEventListener("touchend",()=>{

charging = false
stopChargeLoop()

centerEl.style.transform="translate(0,0)"

setTimeout(()=>{
clearActive()
log("等待操作")
},400)

})

</script>

</body>
</html>
