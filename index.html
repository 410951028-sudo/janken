<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>節奏版猜拳</title>
<style>
body { text-align:center; font-family:sans-serif; }
#stick {
  width:100px; height:100px;
  background:#ccc; border-radius:50%;
  margin:20px auto;
  line-height:100px;
}
#log { max-width:500px; margin:auto; text-align:left; }
</style>
</head>
<body>

<h2 id="phase">等待開始</h2>
<div id="stick">按住</div>
<h3 id="hp"></h3>
<div id="log"></div>

<script>
let hpA = 2000
let hpB = 2000

let phase = "IDLE"
let holding = false
let holdTimer = null

let currentInput = null
let roundCount = 0
let roundSummary = []

const stick = document.getElementById("stick")

/* ================= */
/* 🎮 按住判定 */
/* ================= */

stick.addEventListener("mousedown", startHold)
stick.addEventListener("mouseup", cancelHold)
stick.addEventListener("mouseleave", cancelHold)

function startHold(){
holding = true

holdTimer = setTimeout(()=>{
if(holding){
startRound()
}
},1000)
}

function cancelHold(){
holding = false
clearTimeout(holdTimer)
}

/* ================= */
/* 🎮 回合流程 */
/* ================= */

function startRound(){

roundCount++
roundSummary = []
currentInput = null

phase="START"
updateUI("回合開始")

/* 1.1 SCISSORS */
setTimeout(()=>{
if(!holding) return
phase="SCISSORS"
updateUI("✌️")
},100)

/* 2.0 強提示 */
setTimeout(()=>{
if(!holding) return
updateUI("✌️")
},1000)

/* 2.1 ROCK開始 */
setTimeout(()=>{
if(!holding) return
phase="ROCK"
currentInput=null
updateUI("🪨")
},1100)

/* 3.0 ROCK判定 */
setTimeout(()=>{
if(!holding) return

updateUI("🪨")
resolvePhase("ROCK")

if(!holding) return

},2000)

/* 3.1 PAPER開始 */
setTimeout(()=>{
if(!holding) return
phase="PAPER"
currentInput=null
updateUI("📄")
},2100)

/* 4.0 PAPER判定 */
setTimeout(()=>{
if(!holding) return

updateUI("📄")
resolvePhase("PAPER")
endRound()

},3000)

}

/* ================= */
/* 🎮 玩家輸入 */
/* ================= */

document.addEventListener("keydown",(e)=>{
if(phase==="ROCK" || phase==="PAPER"){

if(e.key==="1") currentInput="scissors"
if(e.key==="2") currentInput="rock"
if(e.key==="3") currentInput="paper"

}
})

/* ================= */
/* 🎮 判定 */
/* ================= */

function resolvePhase(p){

let player = currentInput || "none"
let enemy = randomMove()

let result = judge(player, enemy)

let text = `${phaseName(p)} ${toText(player)} VS ${toText(enemy)} → ${result}`
roundSummary.push(text)

/* 石頭階段直接結束 */
if(p==="ROCK" && (player==="rock" || enemy==="rock")){
applyDamage(result)
endRound()
return
}

applyDamage(result)

}

/* ================= */
/* 🎮 結束 */
/* ================= */

function endRound(){

holding = false

let summaryText = `第${roundCount}回合：\n` + roundSummary.join(" >> ")

let el = document.createElement("div")
el.innerText = summaryText

document.getElementById("log").prepend(el)

phase="IDLE"
updateUI("等待開始")

}

/* ================= */
/* 🎮 工具 */
/* ================= */

function randomMove(){
let arr=["scissors","rock","paper"]
return arr[Math.floor(Math.random()*3)]
}

function judge(a,b){

if(a==="none") return "未出招"

if(a===b) return "平手"

if(
(a==="scissors"&&b==="paper")||
(a==="rock"&&b==="scissors")||
(a==="paper"&&b==="rock")
) return "玩家勝利"

return "電腦勝利"
}

function applyDamage(result){

if(result==="玩家勝利") hpB-=200
if(result==="電腦勝利") hpA-=200

}

function toText(m){
if(m==="scissors") return "剪刀"
if(m==="rock") return "石頭"
if(m==="paper") return "布"
return "無"
}

function phaseName(p){
if(p==="ROCK") return "石頭"
if(p==="PAPER") return "布"
return ""
}

function updateUI(text){
document.getElementById("phase").innerText = text
document.getElementById("hp").innerText=`HP A:${hpA} / HP B:${hpB}`
}

</script>
</body>
</html>
