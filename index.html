<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>уїюТІ│Тѕ░жгЦТИгУЕд</title>

<style>
body{
background:#111;
color:#fff;
font-family:sans-serif;
text-align:center;
}

#pad{
width:200px;
height:200px;
background:#222;
border-radius:50%;
margin:40px auto;
position:relative;
touch-action:none;
}

#stick{
width:80px;
height:80px;
background:#555;
border-radius:50%;
position:absolute;
left:60px;
top:60px;
}

#phase{
font-size:24px;
margin:10px;
}

#history{
margin-top:20px;
font-size:14px;
text-align:left;
padding:10px;
height:200px;
overflow:auto;
border-top:1px solid #333;
}

#hp{
margin-top:10px;
}
</style>

</head>
<body>

<h2>уїюТІ│Тѕ░жгЦ</h2>

<div id="phase">уГЅтЙЁжќІтДІ</div>
<div id="hp">HP A:2000 / HP B:2000</div>

<div id="pad">
<div id="stick"></div>
</div>

<div id="history"></div>

<script>

/* ===== уІђТЁІ ===== */

let hpA = 2000
let hpB = 2000

let phase = "IDLE"
let holding = false
let interval = null

let roundLog = []

const DAMAGE = 200

/* ===== тиЦтЁи ===== */

function enemyMove(){
const arr = ["уЪ│жаГ","тИЃ","тЅфтѕђ"]
return arr[Math.floor(Math.random()*3)]
}

function judge(a,b){
if(a===b) return 0
if(
(a==="уЪ│жаГ"&&b==="тЅфтѕђ")||
(a==="тЅфтѕђ"&&b==="тИЃ")||
(a==="тИЃ"&&b==="уЪ│жаГ")
) return 1
return -1
}

/* ===== UI ===== */

function updateUI(){
document.getElementById("hp").innerText =
`HP A:${hpA} / HP B:${hpB}`
}

function updatePhase(){
document.getElementById("phase").innerText = phase
}

function updateLog(){
let html = roundLog.map(r=>{
return `${r.phase}№йюСйа:${r.player} vs ТЋх:${r.enemy} Рєњ ${r.result}`
}).join("<br>")
document.getElementById("history").innerHTML = html
}

/* ===== тЏътљѕТјДтѕХ ===== */

function startRound(){

phase = "SCISSORS"
roundLog = []
updatePhase()
updateLog()

let triggered = false

interval = setInterval(()=>{

triggered = false

/* Тјежђ▓жџјТ«х */
if(phase === "SCISSORS"){
phase = "ROCK"
}
else if(phase === "ROCK"){
phase = "PAPER"
}
else{
endRound("ТЎѓжќЊухљТЮЪ")
return
}

updatePhase()

/* УІЦТ▓њтЄ║ТІЏ */
if((phase==="ROCK"||phase==="PAPER") && !triggered){

let enemy = enemyMove()

roundLog.push({
phase:phase,
player:"ТюфтЄ║ТІЏ",
enemy:enemy,
result:"жї»жЂј"
})

updateLog()
}

},1000)

}

/* ===== ухљТЮЪ ===== */

function endRound(reason){

clearInterval(interval)
interval = null
holding = false

roundLog.push({
phase:"END",
player:"-",
enemy:"-",
result:reason
})

updateLog()

}

/* ===== тЄ║ТІЏ ===== */

function handleMove(move){

if(!holding) return

let enemy = enemyMove()

let record = {
phase:phase,
player:move,
enemy:enemy,
result:null
}

/* тЅфтѕђжџјТ«худЂТГб */
if(phase==="SCISSORS"){
record.result = "уёАТЋѕ"
roundLog.push(record)
updateLog()
return
}

let result = judge(move,enemy)

if(result===1){
hpB -= DAMAGE
record.result = "тІЮ"
}
else if(result===-1){
hpA -= DAMAGE
record.result = "ТЋЌ"
}
else{
record.result = "т╣│ТЅІ"
}

roundLog.push(record)

updateUI()
updateLog()

/* ROCK уЏ┤ТјЦухљТЮЪ */
if(phase==="ROCK"){
if(move==="уЪ│жаГ" || enemy==="уЪ│жаГ"){
endRound("уЪ│жаГУДИуЎ╝ухљТЮЪ")
return
}
}

/* PAPER ухљТЮЪ */
if(phase==="PAPER"){
endRound("тИЃжџјТ«хухљТЮЪ")
return
}

}

/* ===== ТЊЇСйюуЏц ===== */

const pad = document.getElementById("pad")
const stick = document.getElementById("stick")

let startX = 0
let startY = 0

pad.addEventListener("touchstart",e=>{

holding = true

startX = e.touches[0].clientX
startY = e.touches[0].clientY

startRound()

})

pad.addEventListener("touchmove",e=>{

if(!holding) return

let x = e.touches[0].clientX - startX
let y = e.touches[0].clientY - startY

let dist = Math.sqrt(x*x + y*y)

if(dist < 30) return

if(Math.abs(x) > Math.abs(y)){

if(x > 0){
handleMove("тИЃ")
}else{
handleMove("тЅфтѕђ")
}

}else{

if(y < 0){
handleMove("уЪ│жаГ")
}else{
handleMove("СИЇУдЂ")
}

}

})

pad.addEventListener("touchend",()=>{

holding = false

})

</script>

</body>
</html>
