<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>猜拳戰鬥測試</title>

<style>
body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

#game{
margin-top:20px;
}

.hp{
font-size:20px;
margin:5px;
}

#pad{
width:260px;
height:260px;
margin:20px auto;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

#center{
position:absolute;
width:100px;
height:100px;
left:80px;
top:80px;
background:#666;
border-radius:50%;
transition:0.05s;
}

#log{
margin-top:10px;
font-size:18px;
}

</style>
</head>

<body>

<div id="game">
<div class="hp">玩家HP: <span id="hpA">2000</span></div>
<div class="hp">敵人HP: <span id="hpB">2000</span></div>
</div>

<div id="pad">
<div id="center"></div>
</div>

<div id="log">開始戰鬥</div>

<script>

let hpA = 2000
let hpB = 2000

const pad = document.getElementById("pad")
const centerEl = document.getElementById("center")

let startX, startY
let charging = false
let triggered = false
let chargeStart = 0
let loop = null

function vibrate(p){
if(navigator.vibrate) navigator.vibrate(p)
}

function log(t){
document.getElementById("log").innerText=t
}

function updateHP(){
document.getElementById("hpA").innerText = hpA
document.getElementById("hpB").innerText = hpB
}

/* 猜拳判定 */
function resolve(player){

const choices = ["石頭","布","剪刀","不出"]
let enemy = choices[Math.floor(Math.random()*3)]

if(player === "不出"){
log("你防禦，敵人出："+enemy)
return
}

if(player === "空"){
log("你略過")
return
}

let result = ""

if(player === enemy){
result = "平手"
}
else if(
(player==="石頭" && enemy==="剪刀")||
(player==="布" && enemy==="石頭")||
(player==="剪刀" && enemy==="布")
){
result = "你贏"
hpB -= 200
}else{
result = "你輸"
hpA -= 200
}

updateHP()

log(`你:${player} vs 敵:${enemy} → ${result}`)

}

/* 蓄力 */
function startChargeLoop(){
loop = setInterval(()=>{

if(!charging) return

let progress = (Date.now()-chargeStart)/1000

if(progress >= 1){
charging = false
vibrate([100,30,100])
resolve("不出")
}

},16)
}

function stopChargeLoop(){
clearInterval(loop)
}

/* start */
pad.addEventListener("touchstart",e=>{

const t = e.touches[0]

startX = t.clientX
startY = t.clientY

charging = true
triggered = false
chargeStart = Date.now()

startChargeLoop()

vibrate(10)

})

/* move */
pad.addEventListener("touchmove",e=>{

const t = e.touches[0]

let dx = t.clientX - startX
let dy = t.clientY - startY

let dist = Math.sqrt(dx*dx + dy*dy)

/* 浮動 */
let follow = 45
let mx = Math.max(-follow, Math.min(follow, dx))
let my = Math.max(-follow, Math.min(follow, dy))

centerEl.style.transform =
`translate(${mx}px,${my}px)`

/* 取消蓄力 */
if(dist > 20 && charging){
charging = false
stopChargeLoop()
}

/* 撥動 */
let threshold = 75

if(dist > threshold && !triggered){

triggered = true
stopChargeLoop()

let angle = Math.atan2(dy,dx)*180/Math.PI

let move

if(angle>=-45&&angle<=45) move="布"
else if(angle>45&&angle<135) move="空"
else if(angle>=135||angle<=-135) move="剪刀"
else move="石頭"

vibrate([50,30,50])

resolve(move)
}

})

/* end */
pad.addEventListener("touchend",()=>{

charging = false
stopChargeLoop()

centerEl.style.transform="translate(0,0)"

})

</script>

</body>
</html>
