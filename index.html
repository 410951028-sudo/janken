<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>猜拳對戰</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

<!-- 玩家B -->
<div class="player playerB">

<div class="phase" id="phaseB">✊</div>

<div class="damage" id="damageB"></div>

<div class="hpBar">
<div class="hp" id="hpB"></div>
</div>

<div class="skillPad" id="padB">

<div class="skill up" data-move="rock">👊</div>
<div class="skill left" data-move="paper">🖐</div>
<div class="skill right" data-move="scissors">✌️</div>
<div class="skill down cancel" data-move="cancel">❌</div>

<div class="core" id="fistB">✊</div>

</div>

<div class="status" id="statusB">未選擇</div>

</div>


<!-- 中央提示 -->
<div id="centerInfo">
<div id="roundInfo">Round 1</div>
</div>


<!-- 玩家A -->
<div class="player playerA">

<div class="phase" id="phaseA">✊</div>

<div class="damage" id="damageA"></div>

<div class="hpBar">
<div class="hp" id="hpA"></div>
</div>

<div class="skillPad" id="padA">

<div class="skill up" data-move="rock">👊</div>
<div class="skill left" data-move="paper">🖐</div>
<div class="skill right" data-move="scissors">✌️</div>
<div class="skill down cancel" data-move="cancel">❌</div>

<div class="core" id="fistA">✊</div>

</div>

<div class="status" id="statusA">未選擇</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
