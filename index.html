<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>撥動操作盤</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
font-family:sans-serif;
}

#pad{
width:220px;
height:220px;
border-radius:50%;
background:#222;
position:relative;
touch-action:none;
}

.dir{
position:absolute;
width:70px;
height:70px;
background:#444;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
transition:0.1s;
}

#up{top:10px;left:75px}
#down{bottom:10px;left:75px}
#left{left:10px;top:75px}
#right{right:10px;top:75px}

#center{
position:absolute;
width:80px;
height:80px;
left:70px;
top:70px;
background:#666;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
transition:0.05s;
}

.active{
background:#0af;
transform:scale(1.1);
}

#log{
position:absolute;
bottom:40px;
font-size:22px;
}
</style>
</head>

<body>

<div id="pad">
<div id="up" class="dir">↑</div>
<div id="down" class="dir">↓</div>
<div id="left" class="dir">←</div>
<div id="right" class="dir">→</div>
<div id="center">●</div>
</div>

<div id="log">等待撥動</div>

<script>

const pad = document.getElementById("pad")
const centerEl = document.getElementById("center")

const dirs = {
up:document.getElementById("up"),
down:document.getElementById("down"),
left:document.getElementById("left"),
right:document.getElementById("right")
}

let baseX = 0
let baseY = 0
let triggered = false

function vibrate(pattern){
if(navigator.vibrate) navigator.vibrate(pattern)
}

function clearActive(){
for(let d in dirs){
dirs[d].classList.remove("active")
}
}

/* 起點 */

pad.addEventListener("touchstart",e=>{

const rect = pad.getBoundingClientRect()

baseX = e.touches[0].clientX
baseY = e.touches[0].clientY

triggered = false

vibrate(10)

})

/* 撥動判定 */

pad.addEventListener("touchmove",e=>{

const t = e.touches[0]

let dx = t.clientX - baseX
let dy = t.clientY - baseY

let dist = Math.sqrt(dx*dx + dy*dy)

/* 浮動蘑菇頭（小幅跟隨） */
let follow = 20
let moveX = Math.max(-follow, Math.min(follow, dx))
let moveY = Math.max(-follow, Math.min(follow, dy))

centerEl.style.transform =
`translate(${moveX}px, ${moveY}px)`

/* 撥動門檻 */
let threshold = 40

if(dist < threshold || triggered) return

triggered = true

/* 角度判定 */
let angle = Math.atan2(dy,dx) * 180 / Math.PI

let dir

if(angle >= -45 && angle <= 45){
dir="right"
}
else if(angle > 45 && angle < 135){
dir="down"
}
else if(angle >= 135 || angle <= -135){
dir="left"
}
else{
dir="up"
}

/* 強震動（撥動感） */
vibrate([30,20,30])

clearActive()
dirs[dir].classList.add("active")

document.getElementById("log").innerText =
"觸發: " + dir

})

/* 重置 */

pad.addEventListener("touchend",()=>{

centerEl.style.transform = "translate(0,0)"
clearActive()

})

</script>

</body>
</html>
